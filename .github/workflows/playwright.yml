name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure browsers and OS dependencies are installed
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        playwright install --with-deps

    - name: Run Playwright tests
      run: |
        mkdir -p reports
        # Added --screenshot only-on-failure to prevent 'waiting for fonts' timeouts
        # on passing tests while still capturing errors.
        xvfb-run -a pytest --browser chromium --browser firefox --screenshot only-on-failure

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: reports/report.html